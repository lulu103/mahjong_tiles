<!DOCTYPE html>
<html lang="zh-Hant">

<meta charset="UTF-8">

<title>麻將抽牌</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI","Microsoft JhengHei",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
    width:430px;
    max-width:90%;
    background:#fff;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

h1{
    margin-bottom:20px;
    color:#222;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:20px;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 20px;
    color:#fff;
    cursor:pointer;
    font-size:16px;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(0,0,0,.2);
}

button:active{
    transform:scale(.96);
}

.draw{
    background:#2ecc71;
}

.reset{
    background:#e67e22;
}

#left{
    font-size:20px;
    font-weight:bold;
    color:#444;
    margin-bottom:15px;
}

#img{
    height:200px;
    background:#f5f5f5;
    border-radius:12px;
    padding:8px;
    box-shadow:0 8px 18px rgba(0,0,0,.15);
}

#name{
    margin-top:12px;
    font-size:28px;
    color:#222;
    min-height:36px;
}

.history-title{
    margin-top:30px;
    margin-bottom:10px;
}

.history{
    height:220px;
    overflow-y:auto;
    border:1px solid #ddd;
    border-radius:10px;
    background:#fafafa;
    padding:10px;
    text-align:left;
}

.history-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    margin-bottom:6px;
    background:white;
    border-radius:6px;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
}

.history-item:first-child{
    background:#e8f5e9;
    font-weight:bold;
}
</style>
</head>

let deck = [];

const left = document.getElementById("left");
const img = document.getElementById("img");
const name = document.getElementById("name");
const history = document.getElementById("history");

async function preloadImages() {
    const promises = deck0.map(tile => {
        return new Promise((resolve) => {
            const image = new Image();

            image.onload = () => {
                imageCache[tile.file] = image;
                resolve();
            };

            image.onerror = () => {
                console.warn("Failed to load:", tile.file);
                resolve(); // Continue even if one image fails
            };

            image.src = tile.file;
        });
    });

    // Also preload the blank image
    promises.push(new Promise(resolve => {
        const image = new Image();
        image.onload = resolve;
        image.onerror = resolve;
        image.src = "blank.jpg";
    }));

    await Promise.all(promises);
    imagesLoaded = true;
}

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function clearDisplay(){
    img.src = "blank.jpg";
    name.textContent = "";
}

function clearHistory(){
    history.innerHTML="";
}

function resetDeck(){

    deck=[...deck0];
    shuffle(deck);

    left.textContent="剩餘："+deck.length;

    clearDisplay();
    clearHistory();
}

function draw(){

    if(deck.length===0){
        alert("抽完");
        return;
    }

    const tile=deck.pop();

    img.src=tile.file;
    name.textContent=tile.name;

    left.textContent="剩餘："+deck.length;

    const item=document.createElement("div");
    item.className="history-item";

    const number=document.createElement("span");
    number.textContent=(deck0.length-deck.length)+".";

    const tileName=document.createElement("span");
    tileName.textContent=tile.name;

    item.appendChild(number);
    item.appendChild(tileName);

    history.prepend(item);
}

(async () => {
    left.textContent = "正在載入圖片...";
    await preloadImages();
    resetDeck();
})();
